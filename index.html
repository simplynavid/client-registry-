<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Client Registry</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1714;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c8472b;
    --gold: #b8923a;
    --muted: #8a8178;
    --border: #d4cfc5;
    --success: #2d6a4f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ink);
    color: var(--paper);
    min-height: 100vh;
  }
  .panel-form {
    background: var(--ink);
    padding: 40px 36px 120px;
    max-width: 540px;
    margin: 0 auto;
    width: 100%;
    min-height: 100vh;
  }
  .brand { margin-bottom: 28px; }
  .brand-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .brand-logo { width: 64px; height: 64px; object-fit: contain; flex-shrink: 0; border-radius: 4px; background: #fff; padding: 4px; }
  .brand-collab { font-family: "DM Serif Display", serif; font-size: 16px; line-height: 1.3; }
  .brand-x { color: var(--gold); }
  .brand-eyebrow { font-family: "DM Mono", monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); }
  .divider { height: 1px; background: #333; margin: 28px 0; }
  .field { margin-bottom: 20px; }
  .field label { display: block; font-family: "DM Mono", monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 7px; }
  .field input, .field textarea {
    width: 100%; background: #252220; border: 1px solid #3a3632;
    color: var(--paper); font-family: "DM Sans", sans-serif;
    font-size: 16px; padding: 13px 14px; border-radius: 4px;
    outline: none; -webkit-appearance: none; appearance: none;
  }
  .field input:focus, .field textarea:focus { border-color: var(--gold); }
  .field textarea { resize: vertical; min-height: 80px; }
  .addr-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .payment-toggle { display: flex; gap: 10px; margin-top: 4px; }
  .pay-btn {
    flex: 1; padding: 14px 10px; border-radius: 4px;
    border: 1px solid #3a3632; background: #252220;
    color: var(--muted); font-family: "DM Mono", monospace;
    font-size: 12px; letter-spacing: 0.1em;
    cursor: pointer; text-align: center;
    -webkit-user-select: none; user-select: none;
  }
  .pay-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-register {
    width: 100%; margin-top: 8px; padding: 18px;
    background: var(--accent); color: #fff;
    font-family: "DM Sans", sans-serif; font-size: 16px;
    font-weight: 600; border: none; border-radius: 4px; cursor: pointer;
  }
  .toast {
    display: none; margin-top: 14px; padding: 14px;
    background: var(--success); color: #fff; border-radius: 4px;
    font-size: 14px; font-weight: 500; text-align: center;
  }
  .toast.show { display: block; }

  /* FAB */
  .fab {
    position: fixed; bottom: 28px; right: 24px; z-index: 100;
    background: var(--gold); color: #fff; border: none;
    border-radius: 50px; padding: 16px 22px;
    font-family: "DM Mono", monospace; font-size: 12px;
    letter-spacing: 0.1em; cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    display: flex; align-items: center; gap: 8px;
    -webkit-user-select: none; user-select: none;
  }
  .fab .badge {
    background: var(--accent); color: #fff;
    border-radius: 20px; padding: 2px 8px;
    font-size: 11px; font-weight: 600;
  }

  /* DB Overlay */
  .db-overlay {
    position: fixed; inset: 0;
    background: var(--paper); color: var(--ink);
    z-index: 200; display: flex; flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.35s ease;
    overflow: hidden;
  }
  .db-overlay.open { transform: translateY(0); }
  .db-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    background: #fff; flex-shrink: 0;
  }
  .db-topbar h2 { font-family: "DM Serif Display", serif; font-size: 22px; }
  .db-count { font-family: "DM Mono", monospace; font-size: 11px; color: var(--muted); margin-top: 3px; }
  .btn-close {
    background: none; border: 1px solid var(--border);
    border-radius: 4px; padding: 10px 18px;
    font-family: "DM Mono", monospace; font-size: 11px;
    cursor: pointer; color: var(--ink);
  }
  .db-content { padding: 20px 24px; overflow-y: auto; flex: 1; }
  .db-actions { display: flex; gap: 10px; margin-bottom: 16px; }
  .btn-export {
    padding: 11px 20px; background: var(--ink); color: var(--paper);
    border: none; border-radius: 4px; font-family: "DM Sans", sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .btn-clear-all {
    padding: 11px 16px; background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 4px;
    font-family: "DM Sans", sans-serif; font-size: 13px; cursor: pointer;
  }
  .search-bar { margin-bottom: 16px; }
  .search-bar input {
    width: 100%; max-width: 340px; padding: 11px 14px;
    border: 1px solid var(--border); border-radius: 4px;
    font-family: "DM Sans", sans-serif; font-size: 14px;
    background: var(--cream); color: var(--ink); outline: none;
    -webkit-appearance: none;
  }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { border-bottom: 2px solid var(--ink); }
  thead th { font-family: "DM Mono", monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding: 0 12px 10px; text-align: left; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody td { padding: 12px; vertical-align: top; color: var(--ink); max-width: 160px; word-break: break-word; }
  td.name { font-weight: 600; }
  td.co { color: var(--muted); font-size: 12px; }
  .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-family: "DM Mono", monospace; font-size: 10px; font-weight: 500; }
  .badge-paid { background: #d4edda; color: var(--success); }
  .badge-int { background: #fff3cd; color: #856404; }
  .btn-del { background: none; border: none; color: var(--border); cursor: pointer; font-size: 18px; padding: 0 4px; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
</style>
</head>

    </div>
  </div>
</div>

<script>
var STORAGE_KEY = 'clientRegistry_v1';
var clients = [];
var currentStatus = 'paid';

function loadFromStorage() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    clients = raw ? JSON.parse(raw) : [];
  } catch(e) { clients = []; }
}

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(clients));
  } catch(e) {
    alert('Storage full or unavailable. Export your data now to avoid losing it.');
  }
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setStatus(s) {
  currentStatus = s;
  document.getElementById('btn-paid').className = 'pay-btn' + (s === 'paid' ? ' active' : '');
  document.getElementById('btn-interest').className = 'pay-btn' + (s === 'interest' ? ' active' : '');
}

function updateCount() {
  var n = clients.length;
  document.getElementById('fab-count').textContent = n;
  document.getElementById('db-count').textContent = n + ' client' + (n !== 1 ? 's' : '') + ' registered';
}

function register() {
  var name  = document.getElementById('f-name').value.trim();
  var email = document.getElementById('f-email').value.trim();
  if (!name)  { alert('Please enter a name.'); return; }
  if (!email) { alert('Please enter an email.'); return; }

  var street  = document.getElementById('f-street').value.trim();
  var city    = document.getElementById('f-city').value.trim();
  var state   = document.getElementById('f-state').value.trim();
  var zip     = document.getElementById('f-zip').value.trim();
  var country = document.getElementById('f-country').value.trim();
  var addr = [street, city, state, zip, country].filter(Boolean).join(', ');

  var now = new Date();
  var time = now.toLocaleString('en-CA', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});

  clients.unshift({
    id: Date.now(),
    name: name,
    company: document.getElementById('f-company').value.trim(),
    email: email,
    phone: document.getElementById('f-phone').value.trim(),
    address: addr,
    state: state,
    notes: document.getElementById('f-notes').value.trim(),
    status: currentStatus,
    time: time
  });

  saveToStorage();
  updateCount();
  render();

  ['f-name','f-company','f-email','f-phone','f-street','f-city','f-state','f-zip','f-notes'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-country').value = 'Canada';
  setStatus('paid');

  var toast = document.getElementById('toast');
  toast.className = 'toast show';
  setTimeout(function() { toast.className = 'toast'; }, 2500);
}

function render() {
  var q = document.getElementById('search').value.toLowerCase();
  var list = q ? clients.filter(function(c) {
    return [c.name, c.company, c.email, c.phone].some(function(v) {
      return v && v.toLowerCase().indexOf(q) >= 0;
    });
  }) : clients;

  var tbody = document.getElementById('tbody');
  var empty = document.getElementById('empty');

  if (!list.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = list.map(function(c, i) {
    var num = clients.length - clients.indexOf(c);
    return '<tr>' +
      '<td style="font-family:monospace;font-size:11px;color:#8a8178">' + num + '</td>' +
      '<td class="name">' + esc(c.name) + '</td>' +
      '<td class="co">' + esc(c.company) + '</td>' +
      '<td style="font-size:12px">' + esc(c.email) + '</td>' +
      '<td style="font-size:12px;white-space:nowrap">' + esc(c.phone) + '</td>' +
      '<td style="font-size:12px">' + esc(c.state) + '</td>' +
      '<td><span class="badge ' + (c.status==='paid'?'badge-paid':'badge-int') + '">' + (c.status==='paid'?'✓ Paid':'Interest') + '</span></td>' +
      '<td style="font-size:11px;white-space:nowrap;color:#8a8178">' + esc(c.time) + '</td>' +
      '<td><button class="btn-del" onclick="del(' + c.id + ')">×</button></td>' +
      '</tr>';
  }).join('');
}

function del(id) {
  if (!confirm('Remove this client?')) return;
  clients = clients.filter(function(c) { return c.id !== id; });
  saveToStorage(); updateCount(); render();
}

function exportCSV() {
  if (!clients.length) { alert('No clients to export.'); return; }
  var rows = [['#','Name','Company','Email','Phone','Address','Notes','Status','Registered']];
  clients.forEach(function(c, i) {
    rows.push([clients.length-i, c.name, c.company, c.email, c.phone, c.address, c.notes, c.status==='paid'?'Paid':'Interest Only', c.time]);
  });
  var csv = rows.map(function(r) {
    return r.map(function(v) { return '"' + String(v||'').replace(/"/g,'""') + '"'; }).join(',');
  }).join('\n');
  var blob = new Blob([csv], {type:'text/csv'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'clients_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Wire up buttons with addEventListener (safer than onclick for Safari)
document.getElementById('btn-paid').addEventListener('click', function() { setStatus('paid'); });
document.getElementById('btn-interest').addEventListener('click', function() { setStatus('interest'); });
document.getElementById('btn-register').addEventListener('click', register);
document.getElementById('fab').addEventListener('click', function() {
  document.getElementById('db-overlay').classList.add('open');
  render();
});
document.getElementById('btn-close').addEventListener('click', function() {
  document.getElementById('db-overlay').classList.remove('open');
});
document.getElementById('btn-export').addEventListener('click', exportCSV);
document.getElementById('btn-clear-all').addEventListener('click', function() {
  if (!clients.length) return;
  if (!confirm('Delete all ' + clients.length + ' records? Cannot be undone.')) return;
  clients = []; saveToStorage(); updateCount(); render();
});
document.getElementById('search').addEventListener('input', render);

loadFromStorage();
updateCount();
render();
</script>
</body>
</html>
